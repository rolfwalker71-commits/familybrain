services:
  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: familybrain-qdrant
    volumes:
      - ./data/qdrant:/qdrant/storage
    restart: unless-stopped

  familybrain:
    depends_on:
      - qdrant
    image: ghcr.io/rolfwalker71-commits/familybrain:${FAMILYBRAIN_IMAGE_TAG:-latest}
    container_name: familybrain
    ports:
      - "${FAMILYBRAIN_PORT:-3100}:3000"
    environment:
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      DATABASE_PATH: /app/data/familybrain.sqlite
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      FAMILYBRAIN_USERNAME: ${FAMILYBRAIN_USERNAME:-admin}
      FAMILYBRAIN_PASSWORD: ${FAMILYBRAIN_PASSWORD:-}
      FAMILYBRAIN_PASSWORD_HASH: ${FAMILYBRAIN_PASSWORD_HASH:-}
      FAMILYBRAIN_SESSION_SECRET: ${FAMILYBRAIN_SESSION_SECRET:-}
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-familybrain_chunks}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
    volumes:
      # Persist SQLite (+ WAL) across restarts / redeploys
      - ./data:/app/data
    restart: unless-stopped
